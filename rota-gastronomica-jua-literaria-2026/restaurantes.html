<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurantes · Rota Gastronômica Juá Literária 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="placeholder-page">
  <header class="site-header">
    <div class="container header-shell">
      <a class="wordmark" href="index.html"><img src="assets/logo-jua-literaria.png" alt="Rota Gastronômica Juá Literária 2026"></a>
      <nav class="desktop-nav" aria-label="Principal">
        <a href="mapa.html">Mapa</a>
        <a class="is-active" href="restaurantes.html">Restaurantes</a>
        <a href="index.html#como-funciona">Como funciona</a>
        <a href="passaporte.html">Passaporte</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="section-spacing" style="padding-top: 40px; padding-bottom: 120px;">
        <div class="section-heading">
          <p class="section-label">Rota Gastronômica</p>
          <h1>Estabelecimentos participantes</h1>
          <p style="font-size: 1.1rem; color: var(--color-text-soft); margin-top: 12px;">Conheça todos os estabelecimentos da rota e descubra o prato especial de cada um.</p>
        </div>
        <div class="cards-grid" id="all-restaurants"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-meta">
      <small>© <span id="current-year"></span> Rota Gastronômica Juá Literária 2026.</small>
    </div>
  </footer>

  <nav class="mobile-nav" aria-label="Navegação inferior">
    <a href="index.html">
      <span class="material-symbols-outlined nav-icon">home</span>
      Início
    </a>
    <a href="mapa.html">
      <span class="material-symbols-outlined nav-icon">map</span>
      Mapa
    </a>
    <a href="passaporte.html">
      <span class="material-symbols-outlined nav-icon">auto_stories</span>
      Passaporte
    </a>
  </nav>

  <script>
    var ESTABELECIMENTOS = [];

    function renderAll() {
      var target = document.getElementById("all-restaurants");
      if (!target) return;

      target.innerHTML = ESTABELECIMENTOS.map(function (item) {
        return '<a href="estabelecimento.html?slug=' + item.slug + '" style="display: block; text-decoration: none; color: inherit;">' +
          '<article class="restaurant-card">' +
            '<img src="' + item.image + '" alt="' + item.name + '" loading="lazy">' +
            '<div class="card-body">' +
              '<div class="card-meta">' +
                '<span>' + item.category + '</span>' +
              '<span class="card-price">' + (item.priceLabel || 'Consultar cardápio') + '</span>' +
              '</div>' +
              '<h3>' + item.name + '</h3>' +
              '<p>' + (item.description || 'Estabelecimento participante da Rota Gastronômica Juá Literária.') + '</p>' +
              (item.specialDish ? '<span class="card-dish">Prato especial: ' + item.specialDish + '</span>' : '') +
            '</div>' +
          '</article>' +
        '</a>';
      }).join("");
    }

    fetch("data/estabelecimentos.json")
      .then(function (response) { return response.json(); })
      .then(function (data) {
        ESTABELECIMENTOS = data;
        renderAll();
      });

    var yearEl = document.getElementById("current-year");
    if (yearEl) yearEl.textContent = String(new Date().getFullYear());
  </script>
</body>
</html>
