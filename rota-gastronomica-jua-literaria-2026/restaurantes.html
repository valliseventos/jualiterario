<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurantes · Rota Gastronômica Juá Literária 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="placeholder-page">
  <header class="site-header">
    <div class="container header-shell">
      <a class="wordmark" href="index.html"><img src="assets/logo-jua-literaria.png" alt="Rota Gastronômica Juá Literária 2026"></a>
      <nav class="desktop-nav" aria-label="Principal">
        <a href="mapa.html">Mapa</a>
        <a class="is-active" href="restaurantes.html">Restaurantes</a>
        <a href="index.html#como-funciona">Como funciona</a>
        <a href="passaporte.html">Passaporte</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="section-spacing" style="padding-top: 40px; padding-bottom: 120px;">
        <div class="section-heading">
          <p class="section-label">Rota Gastronômica</p>
          <h1>Estabelecimentos participantes</h1>
          <p style="font-size: 1.1rem; color: var(--color-text-soft); margin-top: 12px;">Conheça todos os estabelecimentos da rota e descubra o prato especial de cada um.</p>
        </div>
        <div class="cards-grid" id="all-restaurants"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-meta">
      <small>© <span id="current-year"></span> Rota Gastronômica Juá Literária 2026.</small>
    </div>
  </footer>

  <nav class="mobile-nav" aria-label="Navegação inferior">
    <a href="index.html">
      <span class="material-symbols-outlined nav-icon">home</span>
      Início
    </a>
    <a href="mapa.html">
      <span class="material-symbols-outlined nav-icon">map</span>
      Mapa
    </a>
    <a href="passaporte.html">
      <span class="material-symbols-outlined nav-icon">auto_stories</span>
      Passaporte
    </a>
  </nav>

  <script>
    var ESTABELECIMENTOS = [
      {"id":1,"slug":"casa-da-orla","name":"Casa da Orla","category":"Restaurante","priceLabel":"R$ 58","specialDish":"Arroz de panela com carne de sol e creme de abóbora","description":"Um ponto de encontro voltado para almoços demorados, conversa e cozinha regional com leitura contemporânea.","neighborhood":"Orla I","image":"assets/estabelecimento-1.svg","featured":true},
      {"id":2,"slug":"cafe-da-ponte","name":"Cafe da Ponte","category":"Cafe","priceLabel":"R$ 24","specialDish":"Bolo de milho tostado com creme de queijo e café gelado","description":"Ambiente leve e urbano, pensado para pausas rápidas entre uma atividade do festival e outra.","neighborhood":"Centro","image":"assets/estabelecimento-2.svg","featured":true},
      {"id":3,"slug":"quintal-do-velho-chico","name":"Quintal do Velho Chico","category":"Bistro","priceLabel":"R$ 67","specialDish":"Peixe grelhado com purê de macaxeira e farofa de castanhas","description":"Uma experiência mais calma, com quintal sombreado, pratos quentes e clima de fim de tarde.","neighborhood":"Orla II","image":"assets/estabelecimento-3.svg","featured":true},
      {"id":4,"slug":"mercado-dos-sabores","name":"Mercado dos Sabores","category":"Cozinha rapida","priceLabel":"R$ 31","specialDish":"Sanduíche regional com queijo coalho, melão e melão de rapadura","description":"Parada agitada da rota, com serviço rápido, visual vibrante e proposta pensada para circular.","neighborhood":"Centro","image":"assets/estabelecimento-4.svg","featured":true},
      {"id":5,"slug":"varanda-do-sertao","name":"Varanda do Sertao","category":"Restaurante","priceLabel":"R$ 52","specialDish":"Galinhada cremosa com picles de maxixe","description":"Comida afetiva e atmosfera familiar para quem deseja prolongar o passeio pela rota.","neighborhood":"Santo Antonio","image":"assets/estabelecimento-5.svg","featured":false},
      {"id":6,"slug":"atelier-doce","name":"Atelier Doce","category":"Sobremesas","priceLabel":"R$ 22","specialDish":"Cartola reinterpretada com mel de umbu","description":"Pequena casa de doces e café, ideal para encerrar o circuito com uma última parada.","neighborhood":"Centro","image":"assets/estabelecimento-6.svg","featured":false}
    ];

    function renderAll() {
      var target = document.getElementById("all-restaurants");
      if (!target) return;

      target.innerHTML = ESTABELECIMENTOS.map(function (item) {
        return '<a href="estabelecimento.html?slug=' + item.slug + '" style="display: block; text-decoration: none; color: inherit;">' +
          '<article class="restaurant-card">' +
            '<img src="' + item.image + '" alt="' + item.name + '" loading="lazy">' +
            '<div class="card-body">' +
              '<div class="card-meta">' +
                '<span>' + item.category + '</span>' +
                '<span class="card-price">' + item.priceLabel + '</span>' +
              '</div>' +
              '<h3>' + item.name + '</h3>' +
              '<p>' + item.description + '</p>' +
              '<span class="card-dish">Prato especial: ' + item.specialDish + '</span>' +
            '</div>' +
          '</article>' +
        '</a>';
      }).join("");
    }

    renderAll();

    var yearEl = document.getElementById("current-year");
    if (yearEl) yearEl.textContent = String(new Date().getFullYear());
  </script>
</body>
</html>
